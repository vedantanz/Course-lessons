/* ---------- signature: the wave that carries the thesis ---------- */

function WaveCanvas({ sigma, height = 180, showEnvelope = true }) {
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current;
    if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    const w = cv.clientWidth, h = height;
    cv.width = w * dpr; cv.height = h * dpr;
    const ctx = cv.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    const mid = h / 2, freq = 22, s = sigma * w;
    // envelope
    if (showEnvelope && sigma < 0.98) {
      ctx.beginPath();
      for (let x = 0; x <= w; x++) {
        const g = Math.exp(-((x - w / 2) ** 2) / (2 * s * s));
        const y = mid - g * (h * 0.4);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      for (let x = w; x >= 0; x--) {
        const g = Math.exp(-((x - w / 2) ** 2) / (2 * s * s));
        ctx.lineTo(x, mid + g * (h * 0.4));
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(227,180,88,0.06)";
      ctx.fill();
    }
    // wave
    ctx.beginPath();
    for (let x = 0; x <= w; x++) {
      const g = sigma >= 0.98 ? 1 : Math.exp(-((x - w / 2) ** 2) / (2 * s * s));
      const y = mid - Math.sin((x / w) * Math.PI * 2 * freq) * g * (h * 0.4);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = C.gold;
    ctx.lineWidth = 1.6;
    ctx.stroke();
    // midline
    ctx.beginPath();
    ctx.moveTo(0, mid); ctx.lineTo(w, mid);
    ctx.strokeStyle = "rgba(154,161,181,0.18)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }, [sigma, height, showEnvelope]);
  return <canvas ref={ref} style={{ width: "100%", height, display: "block" }} aria-hidden="true" />;
}

const SlideCover = () => {
  const [t, setT] = useState(0);
  useEffect(() => {
    let raf, start;
    const loop = (ts) => {
      if (!start) start = ts;
      setT(((ts - start) / 6000) % 1);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);
  const sigma = 0.06 + 0.94 * (0.5 - 0.5 * Math.cos(t * Math.PI * 2));
  return (
    <div className="lf-fade" style={{ textAlign: "center", maxWidth: 860, margin: "0 auto" }}>
      <Eyebrow>A Research Exploration · Ritam Wellbeing Framework</Eyebrow>

const SlideSpanda = () => {
  const [phase, setPhase] = useState(0);
  useEffect(() => {
    let raf, start;
    const loop = (ts) => {
      if (!start) start = ts;
      setPhase(((ts - start) / 3600) % 1);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);
  const breathe = 0.5 - 0.5 * Math.cos(phase * Math.PI * 2); // 0..1..0
  const size = 60 + breathe * 120;
  const isOpen = breathe > 0.5;
  return (
    <div className="lf-fade">

            opacity: idx === SLIDES.length - 1 ? 0.4 : 1,
            padding: "9px 22px", borderRadius: 24, fontSize: 13, fontWeight: 500,
            cursor: idx === SLIDES.length - 1 ? "default" : "pointer", letterSpacing: "0.04em",
          }}>Next →</button>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(LightAndField));
</script>
</body>
</html>
